{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Saved Motivations</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<header>
    <h1>All Motivation Entries</h1>
</header>

<div class="container">

    {% for entry in entries %}
        <div class="entry-card">
            <h3>{{ entry.name }}</h3>
            <p>{{ entry.message }}</p>
            <small>{{ entry.created_at }}</small>
        </div>
    {% empty %}
        <p>No entries yet.</p>
    {% endfor %}

    <br>
    <a href="/">Back to Home</a>

</div>

</body>
</html>
